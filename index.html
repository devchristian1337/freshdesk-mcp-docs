<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/img/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Nei refresh non riusare la posizione della pagina precedente: il
      // ripristino nativo tardivo renderebbe visibile uno scroll verso il basso.
      (function () {
        var navigation = performance.getEntriesByType?.('navigation')[0];
        var isReload = navigation?.type === 'reload' || performance.navigation?.type === 1;
        if (isReload && 'scrollRestoration' in history) {
          history.scrollRestoration = 'manual';
          window.scrollTo(0, 0);
        }
      })();
    </script>
    <script>
      // Anti-FOUC: imposta il tema prima del primo paint.
      // Ordine: scelta salvata → preferenza di sistema → chiaro.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var dark =
            saved === 'dark' ||
            (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <!--app-head-->
    <title>Freshdesk MCP</title>
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
