<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/img/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Al refresh partiamo sempre dall'alto e poi torniamo dolcemente alla
      // posizione precedente della stessa route, senza il ripristino nativo
      // imprevedibile durante il caricamento.
      (function () {
        var storageKey = 'freshdesk-mcp:scroll:' + location.pathname + location.search + location.hash;
        var navigation = performance.getEntriesByType?.('navigation')[0];
        var isReload = navigation?.type === 'reload' || performance.navigation?.type === 1;
        var savedY = 0;

        try {
          savedY = Number(sessionStorage.getItem(storageKey)) || 0;
        } catch (e) {
          // Lo storage puo' non essere disponibile in modalita' privata.
        }

        window.addEventListener('pagehide', function () {
          try {
            sessionStorage.setItem(storageKey, String(window.scrollY));
          } catch (e) {
            // La pagina resta navigabile anche senza persistenza della posizione.
          }
        });

        if (isReload && savedY > 0) {
          if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
          window.scrollTo({top: 0, left: 0, behavior: 'auto'});

          window.addEventListener('load', function () {
            // Due frame garantiscono un paint iniziale in alto prima dello
            // scroll animato verso la posizione salvata.
            requestAnimationFrame(function () {
              window.scrollTo({top: 0, left: 0, behavior: 'auto'});
              requestAnimationFrame(function () {
                var startTime = performance.now();
                var duration = Math.min(900, Math.max(450, savedY * 0.12));

                function animateScroll(now) {
                  var progress = Math.min((now - startTime) / duration, 1);
                  // Cubic ease-out: partenza visibile, arrivo morbido.
                  var eased = 1 - Math.pow(1 - progress, 3);
                  window.scrollTo({top: Math.round(savedY * eased), left: 0, behavior: 'auto'});

                  if (progress < 1) {
                    requestAnimationFrame(animateScroll);
                  } else if ('scrollRestoration' in history) {
                    history.scrollRestoration = 'auto';
                  }
                }

                requestAnimationFrame(animateScroll);
              });
            });
          }, {once: true});
        }
      })();
    </script>
    <script>
      // Anti-FOUC: imposta il tema prima del primo paint.
      // Ordine: scelta salvata → preferenza di sistema → chiaro.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var dark =
            saved === 'dark' ||
            (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <!--app-head-->
    <title>Freshdesk MCP</title>
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
